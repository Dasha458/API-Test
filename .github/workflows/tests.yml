name: Tests

on:
  pull_request:
    branches: [ main ]
  schedule:
    - cron: '0 6 * * *'
  workflow_dispatch:
    inputs:
      browser:
        description: 'Browser for UI tests'
        required: true
        default: 'chrome'
        type: choice
        options:
          - chrome
          - firefox
          - edge

env:
  DOTNET_VERSION: '8.0.x'
  CONFIGURATION: 'Release'
  RESULTS_DIR: 'TestResults'
  BROWSER: ${{ github.event.inputs.browser || 'chrome' }}

jobs:
  test:
    name: Run API and UI tests
    runs-on: windows-latest

    steps:
      - name: Checkout
        uses: actions/checkout@v4

      - name: Setup .NET
        uses: actions/setup-dotnet@v4
        with:
          dotnet-version: ${{ env.DOTNET_VERSION }}

      - name: Restore
        run: dotnet restore

      - name: Build
        run: dotnet build --no-restore --configuration ${{ env.CONFIGURATION }}

      - name: Run API tests
        id: api-tests
        continue-on-error: true
        run: >
          dotnet test
          --no-build
          --configuration ${{ env.CONFIGURATION }}
          --filter "TestCategory=API"
          --logger "trx;LogFileName=api-tests.trx"
          --logger "console;verbosity=normal"
          --results-directory ${{ env.RESULTS_DIR }}

      - name: Run UI tests
        id: ui-tests
        continue-on-error: true
        env:
          BROWSER: ${{ env.BROWSER }}
        run: >
          dotnet test
          --no-build
          --configuration ${{ env.CONFIGURATION }}
          --filter "TestCategory=UI"
          --logger "trx;LogFileName=ui-tests.trx"
          --logger "console;verbosity=normal"
          --results-directory ${{ env.RESULTS_DIR }}

      - name: Publish test artifacts
        if: always()
        uses: actions/upload-artifact@v4
        with:
          name: test-results
          path: |
            ${{ env.RESULTS_DIR }}/**
            **/logs/**
            **/screenshots/**
          if-no-files-found: ignore
          retention-days: 14

      - name: Fail job if API tests failed
        if: steps.api-tests.outcome == 'failure'
        run: |
          Write-Host "::error::API tests failed"
          exit 1
